okapi_url: http://localhost:3333
Dsecure_store_props: src/test/resources/ephemeral.properties
secure_store_props: ${Dsecure_store_props}
Dsecure_store: Ephemeral
secure_store: ${Dsecure_store}
Dcaia_soft_tenants: caiaSoft_tenants
caia_soft_tenants: ${Dcaia_soft_tenants}
spring:
  application:
    name: edge-caiasoft
  jackson:
    default-property-inclusion: non_null
  liquibase:
    enabled: false
  flyway:
    enabled: false

feign:
  client:
    config:
      default:
        loggerLevel: full

logging:
  level:
    org:
      springframework:
        cache: OFF

#folio.tenant.validation.enabled: false
folio:
  tenant:
  validation:
    enabled: enabled
  system-user:
    username: ${SYSTEM_USER_NAME:system-user}
  environment: ${ENV:folio}
  okapi-url: ${Dokapi_url:http://okapi:9130}
# disable scheduling
app.scheduling.enable: false
